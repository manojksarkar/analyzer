[pytest]
testpaths = tests
addopts = -v --tb=short -s --cov=src --cov=fake_flowchart_generator --cov=fake_behaviour_diagram_generator --cov=run --cov-report=term-missing --cov-report=html:tests/coverage_html
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    unit: pure Python, no pipeline, no network
    integration: reads pipeline output from model/ and output/
    e2e: reads the final DOCX artifact
