[pytest]
testpaths = tests
norecursedirs = src .git .venv __pycache__ node_modules .flowchart_cache
addopts = -v --tb=short -s --cov=src --cov=fake_flowchart_generator --cov=fake_behaviour_diagram_generator --cov=run --cov-report=term-missing --cov-report=html:tests/coverage_html
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    unit: pure Python, no pipeline, no network
    e2e: runs the pipeline once, checks all artifacts and final DOCX
    llm: tests for LLM-generated content (xfail until real LLM seam is wired)
