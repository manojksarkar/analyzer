[pytest]
markers =
    unit: fast isolated tests — no pipeline, no I/O, no LLM server
    llm: requires the LLM seam to be wired (marked xfail until implemented)
    e2e: requires the full pipeline to have run against SampleCppProject
    slow: long-running (opt-in with -m slow)

# Only collect from tests/; src/ contains standalone scripts, not pytest suites
testpaths = tests
norecursedirs = src .git logs model output .flowchart_cache .claude __pycache__

addopts = --tb=short -q
